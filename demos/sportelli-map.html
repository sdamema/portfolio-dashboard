<script>
(function () {
  const roots = document.querySelectorAll(".pn-sportelli[data-widget='sportelli-map']");

  roots.forEach((root) => {
    const dataNode = root.querySelector("script[type='application/json'][data-pn-sportelli-data]");
    if (!dataNode) return;

    const payload = JSON.parse(dataNode.textContent);
    const regions = payload.regions || [];
    const summary = payload.summary || {};
    const regionPaths = root.querySelectorAll(".pn-sportelli__region");
    const regionButtons = root.querySelectorAll(".pn-sportelli__region-btn");
    const list = root.querySelector("[data-pn-list]");
    const selectedLabel = root.querySelector("[data-pn-selected]");
    const resultCount = root.querySelector("[data-pn-result-count]");
    const regionCount = root.querySelector("[data-pn-region-count]");
    const searchInput = root.querySelector("[data-pn-search]");
    const moreButton = root.querySelector("[data-pn-more]");
    const limit = 60;

    let selectedSlug = payload.defaultRegionSlug || (regions[0] && regions[0].region_slug);
    let visibleLimit = limit;

    if (resultCount) resultCount.textContent = String(summary.publishable_total || summary.sportelli_total || 0);
    if (regionCount) regionCount.textContent = String(regions.length);

    const bySlug = new Map(regions.map((region) => [region.region_slug, region]));

    function normalize(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
    }

    function activeRegion() {
      return bySlug.get(selectedSlug) || regions[0] || { region: "", items: [] };
    }

    function filteredItems() {
      const query = normalize(searchInput ? searchInput.value : "");
      const items = activeRegion().items || [];
      if (!query) return items;
      return items.filter((item) => {
        return normalize([item.city, item.provider, item.province_code].join(" ")).includes(query);
      });
    }

    function linkLabel(item) {
      return item.title || item.url;
    }

    function renderList() {
      const region = activeRegion();
      const items = filteredItems();
      const visible = items.slice(0, visibleLimit);

      selectedLabel.textContent = `${region.region} (${items.length})`;
      list.innerHTML = "";

      if (!items.length) {
        const empty = document.createElement("li");
        empty.className = "pn-sportelli__empty";
        empty.textContent = "Nessun risultato per questa ricerca.";
        list.appendChild(empty);
      } else {
        visible.forEach((item) => {
          const li = document.createElement("li");
          li.className = "pn-sportelli__item";
          const sourceBadge = item.is_in_live_sitemap ? "Live" : "Crawl";
          const anchor = document.createElement("a");
          anchor.href = item.url;

          const text = document.createElement("span");
          const title = document.createElement("strong");
          title.textContent = `${item.provider} ${item.city}`;
          const meta = document.createElement("span");
          meta.textContent = `${item.province_code ? item.province_code + " · " : ""}${linkLabel(item)}`;

          const badge = document.createElement("em");
          badge.className = "pn-sportelli__badge";
          badge.textContent = sourceBadge;

          text.appendChild(title);
          text.appendChild(meta);
          anchor.appendChild(text);
          anchor.appendChild(badge);
          li.appendChild(anchor);
          list.appendChild(li);
        });
      }

      if (moreButton) {
        const hasMore = items.length > visibleLimit;
        moreButton.classList.toggle("is-visible", hasMore);
        moreButton.textContent = `Mostra altri ${Math.min(limit, items.length - visibleLimit)}`;
      }
    }

    function syncActiveStates() {
      regionPaths.forEach((path) => {
        const active = path.getAttribute("data-region-slug") === selectedSlug;
        path.classList.toggle("is-active", active);
        path.setAttribute("aria-pressed", active ? "true" : "false");
      });
      regionButtons.forEach((button) => {
        const active = button.getAttribute("data-region-slug") === selectedSlug;
        button.classList.toggle("is-active", active);
        button.setAttribute("aria-pressed", active ? "true" : "false");
      });
    }

    function selectRegion(slug) {
      if (!bySlug.has(slug)) return;
      selectedSlug = slug;
      visibleLimit = limit;
      syncActiveStates();
      renderList();
    }

    regionPaths.forEach((path) => {
      path.addEventListener("click", () => selectRegion(path.getAttribute("data-region-slug")));
      path.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          selectRegion(path.getAttribute("data-region-slug"));
        }
      });
    });

    regionButtons.forEach((button) => {
      button.addEventListener("click", () => selectRegion(button.getAttribute("data-region-slug")));
    });

    if (searchInput) {
      searchInput.addEventListener("input", () => {
        visibleLimit = limit;
        renderList();
      });
    }

    if (moreButton) {
      moreButton.addEventListener("click", () => {
        visibleLimit += limit;
        renderList();
      });
    }

    syncActiveStates();
    renderList();
  });
})();

</script>
